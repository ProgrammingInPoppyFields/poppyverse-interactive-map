<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poppyverse Cluster Dashboard</title>
  <style>
    :root {
      --poppy-red: #ff1447;
      --bg: #0d0d10;
      --panel: #17171d;
      --panel-2: #21212b;
      --text: #f7f1ee;
      --muted: rgba(247, 241, 238, 0.68);
      --line: rgba(255, 255, 255, 0.14);
      --shadow: rgba(0, 0, 0, 0.42);
      --drawer-width: min(820px, 90vw);
    }

    * {
      box-sizing: border-box;
    }


    .poppy-nav {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 7px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(8, 8, 14, 0.66);
      box-shadow: 0 16px 42px rgba(0,0,0,.32), 0 0 22px rgba(255,20,71,.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .poppy-nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      color: rgba(255,255,255,.82);
      text-decoration: none;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .35px;
      border: 1px solid transparent;
      transition: background .16s ease, border-color .16s ease, color .16s ease, box-shadow .16s ease;
      white-space: nowrap;
    }

    .poppy-nav a:hover {
      color: #fff;
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.18);
    }

    .poppy-nav a.active {
      color: #fff;
      background: var(--poppy-red, #ff1447);
      border-color: color-mix(in srgb, var(--poppy-red, #ff1447) 72%, white);
      box-shadow: 0 0 18px color-mix(in srgb, var(--poppy-red, #ff1447) 44%, transparent);
    }

    @media (max-width: 560px) {
      .poppy-nav {
        top: 10px;
        width: calc(100vw - 20px);
        justify-content: center;
        overflow-x: auto;
        border-radius: 18px;
      }

      .poppy-nav a {
        padding: 0 10px;
        font-size: 11px;
      }
    }
    

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 20, 71, 0.16), transparent 32rem),
        radial-gradient(circle at 90% 95%, rgba(94, 23, 235, 0.15), transparent 34rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(1440px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 88px 0 72px;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.25rem, 4.2vw, 4.8rem);
      line-height: 0.92;
      letter-spacing: -0.07em;
    }

    .subtitle {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 300px);
      gap: 18px;
      align-items: start;
    }

    .cluster-card {
      position: relative;
      width: 300px;
      height: 200px;
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      padding: 18px;
      color: white;
      background-color: var(--cluster-color);
      box-shadow: 0 18px 44px var(--shadow);
      text-align: left;
      isolation: isolate;
      transition: transform 160ms ease, filter 160ms ease, border-color 160ms ease;
    }

    .cluster-card:hover,
    .cluster-card:focus-visible {
      transform: translateY(-4px);
      filter: brightness(1.08) saturate(1.08);
      border-color: rgba(255, 255, 255, 0.36);
      outline: none;
    }

    .cluster-card.has-cover {
      background-image: var(--cover-url);
      background-size: cover;
      background-position: center;
    }

    .cluster-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--cluster-color);
      opacity: var(--overlay-opacity, 0.94);
      z-index: -2;
    }

    .cluster-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.18), transparent 38%, rgba(0,0,0,0.38)),
        radial-gradient(circle at 70% 15%, rgba(255,255,255,0.22), transparent 16rem);
      z-index: -1;
    }

    .cluster-count {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.30);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.75rem;
      font-weight: 850;
      letter-spacing: 0.045em;
      text-transform: uppercase;
      background: rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(8px);
      text-shadow: 0 1px 10px rgba(0,0,0,0.35);
    }

    .cluster-name {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 17px;
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: -0.048em;
      text-shadow: 0 2px 20px rgba(0,0,0,0.52);
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.52);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 20;
    }

    .backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--drawer-width);
      height: 100vh;
      background: linear-gradient(180deg, var(--panel), #101015);
      border-left: 1px solid var(--line);
      box-shadow: -28px 0 70px rgba(0,0,0,0.55);
      transform: translateX(104%);
      transition: transform 220ms ease;
      z-index: 30;
      display: flex;
      flex-direction: column;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-top {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, var(--active-color, #444), rgba(255,255,255,0.035) 62%),
        var(--panel);
    }

    .drawer-kicker {
      margin: 0 0 8px;
      color: rgba(255,255,255,0.75);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .drawer-title-row {
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: flex-start;
    }

    .drawer-title {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 3.2rem);
      line-height: 0.96;
      letter-spacing: -0.065em;
    }

    .close-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(0,0,0,0.2);
      color: white;
      border-radius: 999px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 1.35rem;
      line-height: 1;
      flex: 0 0 auto;
    }

    .close-button:hover {
      background: rgba(255,255,255,0.13);
    }

    .drawer-desc {
      margin: 14px 0 0;
      color: rgba(255,255,255,0.84);
      line-height: 1.55;
      white-space: pre-wrap;
      max-width: 68ch;
    }

    .table-wrap {
      overflow: auto;
      padding: 18px 24px 30px;
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1040px;
      font-size: 0.9rem;
    }

    th,
    td {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 10px 12px;
      vertical-align: top;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--panel-2);
      color: rgba(255,255,255,0.92);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    td {
      color: rgba(255,255,255,0.78);
      line-height: 1.45;
      white-space: pre-wrap;
    }

    tr:hover td {
      background: rgba(255,255,255,0.045);
    }

    a {
      color: #fff;
      font-weight: 850;
    }

    .empty-state {
      margin: 0;
      color: var(--muted);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
    }

    @media (max-width: 720px) {
      .page {
        width: min(100vw - 28px, 360px);
        padding-top: 28px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .cluster-card {
        width: 100%;
      }

      .drawer {
        width: 100vw;
      }

      .drawer-top {
        padding: 20px 18px 16px;
      }

      .table-wrap {
        padding: 16px 18px 28px;
      }
    }
  </style>
</head>

rs": "DONOR the black hole, PILOT the neutron star", "Size": "1", "(X) Relativity": "10", "(Y) Relatability": "2", "(Z) Depth": "2", "Collisions": "", "Content URL": ""}, {"ID": "35", "Name": "make the stars scream", "Cluster": "beyond the poppyverse", "Description": "The stars are screaming. Literally.", "Characters": "DONOR, PILOT, Various other familiar souls", "Size": "1", "(X) Relativity": "10", "(Y) Relatability": "2", "(Z) Depth": "10", "Collisions": "", "Content URL": ""}, {"ID": "16", "Name": "21 pilots, too many pilots", "Cluster": "beyond the poppyverse", "Description": "All the PILOTs, from every fork and timeline and universe. No such thing as too many. Probably.", "Characters": "All the PILOTs, Techie PILOT", "Size": "5", "(X) Relativity": "10", "(Y) Relatability": "2", "(Z) Depth": "0", "Collisions": "", "Content URL": "https://inpoppyfields.tumblr.com/tagged/21%20pilots%20too%20many%20pilots/chrono"}, {"ID": "19", "Name": "you’ve got soul", "Cluster": "beyond the poppyverse", "Description": "The author hopes you do. Really.", "Characters": "", "Size": "1", "(X) Relativity": "10", "(Y) Relatability": "2", "(Z) Depth": "0", "Collisions": "", "Content URL": ""}]}], "columns": ["ID", "Name", "Cluster", "Description", "Characters", "Size", "(X) Relativity", "(Y) Relatability", "(Z) Depth", "Collisions", "Content URL"]}</script>
  <script>
    const data = JSON.parse(document.getElementById('dashboard-data').textContent);

    const grid = document.getElementById('clusterGrid');
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('backdrop');
    const drawerTop = document.getElementById('drawerTop');
    const drawerKicker = document.getElementById('drawerKicker');
    const drawerTitle = document.getElementById('drawerTitle');
    const drawerDesc = document.getElementById('drawerDesc');
    const tableWrap = document.getElementById('tableWrap');
    const closeButton = document.getElementById('closeButton');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function cssUrl(value) {
      return `url("${String(value).replaceAll('"', '%22')}")`;
    }

    function linkifyCell(column, value) {
      const text = String(value ?? '').trim();
      if (!text) {
        return '<span style="opacity:0.45">—</span>';
      }

      const isUrlColumn = /url|link|href/i.test(column);
      if (isUrlColumn && /^https?:\/\//i.test(text)) {
        const safe = escapeHtml(text);
        return `<a href="${safe}" target="_blank" rel="noopener noreferrer">open</a>`;
      }

      return escapeHtml(text);
    }

    function renderGrid() {
      grid.innerHTML = '';

      data.clusters.forEach((cluster, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'cluster-card' + (cluster.cover_url ? ' has-cover' : '');
        button.style.setProperty('--cluster-color', cluster.color || '#555555');
        button.style.setProperty('--overlay-opacity', cluster.cover_url ? '0.74' : '0.96');

        if (cluster.cover_url) {
          button.style.setProperty('--cover-url', cssUrl(cluster.cover_url));
        }

        button.innerHTML = `
          <span class="cluster-count">${cluster.count} entr${cluster.count === 1 ? 'y' : 'ies'}</span>
          <h2 class="cluster-name">${escapeHtml(cluster.name)}</h2>
        `;

        button.addEventListener('click', () => openDrawer(index));
        grid.appendChild(button);
      });
    }

    function renderTable(cluster) {
      const rows = cluster.rows || [];
      const columns = data.columns || [];

      if (!rows.length) {
        tableWrap.innerHTML = '<p class="empty-state">No TOC entries found for this cluster.</p>';
        return;
      }

      const thead = columns.map(col => `<th>${escapeHtml(col)}</th>`).join('');
      const tbody = rows.map(row => {
        const cells = columns.map(col => `<td>${linkifyCell(col, row[col])}</td>`).join('');
        return `<tr>${cells}</tr>`;
      }).join('');

      tableWrap.innerHTML = `
        <table>
          <thead><tr>${thead}</tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      `;
    }

    function openDrawer(index) {
      const cluster = data.clusters[index];

      drawerTop.style.setProperty('--active-color', cluster.color || '#555555');
      drawerKicker.textContent = `${cluster.count} TOC entr${cluster.count === 1 ? 'y' : 'ies'}`;
      drawerTitle.textContent = cluster.name;
      drawerDesc.textContent = cluster.description || 'No cluster description provided. The void declined to comment.';

      renderTable(cluster);

      drawer.classList.add('open');
      backdrop.classList.add('open');
      drawer.setAttribute('aria-hidden', 'false');
      backdrop.setAttribute('aria-hidden', 'false');
      closeButton.focus();
    }

    function closeDrawer() {
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
      drawer.setAttribute('aria-hidden', 'true');
      backdrop.setAttribute('aria-hidden', 'true');
    }

    closeButton.addEventListener('click', closeDrawer);
    backdrop.addEventListener('click', closeDrawer);

    window.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeDrawer();
      }
    });

    renderGrid();
  </script>
