<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poppyverse 3D Map</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="50%" x="50%" dominant-baseline="middle" text-anchor="middle" font-size="52">🌷</text></svg>'>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">

  <style>
    :root {
      --poppy-pink: #FF1447;
      --active-color: #FF1447;
      --nav-height: 58px;
      --control-height: 42px;
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.68);
      --line: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      background: #06060a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 12%, rgba(255, 20, 71, 0.16), transparent 32%),
        radial-gradient(circle at 80% 30%, rgba(112, 68, 255, 0.14), transparent 34%),
        linear-gradient(135deg, #050507 0%, #0b0b12 48%, #11111d 100%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.38) 72%, rgba(0, 0, 0, 0.72) 100%);
    }

    a {
      color: inherit;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 10px 16px;
      pointer-events: none;
    }

    .top-nav-inner {
      width: max-content;
      max-width: calc(100vw - 32px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 28px rgba(0, 0, 0, 0.42);
      pointer-events: auto;
      overflow-x: auto;
    }

    .top-nav-link {
      flex: 0 0 auto;
      padding: 8px 13px;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition:
        color 160ms ease,
        background 160ms ease,
        box-shadow 160ms ease;
    }

    .top-nav-link:hover,
    .top-nav-link.active {
      color: #fff;
      background: var(--poppy-pink);
      box-shadow: 0 0 18px rgba(255, 20, 71, 0.44);
    }

    #graph {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
    }

    .legend {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 22;
      display: flex;
      flex-direction: column-reverse;
      width: min(320px, calc(100vw - 36px));
      max-height: calc(100vh - var(--nav-height) - 40px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.54);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 28px rgba(0, 0, 0, 0.42);
    }

    .legend-toggle {
      width: 100%;
      height: calc(var(--control-height) - 2px);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border: 0;
      background: transparent;
      color: #fff;
      font-family: "Michroma", sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-align: left;
      text-transform: uppercase;
      cursor: pointer;
    }

    .legend-rows {
      display: none;
      max-height: calc(100vh - var(--nav-height) - 100px);
      overflow-y: auto;
      padding: 0 14px 14px;
    }

    .legend.open .legend-rows {
      display: block;
    }

    .legend-row {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 9px;
      padding: 9px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      margin-top: 3px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: 0 0 10px currentColor;
    }

    .legend-name {
      margin: 0;
      font-weight: 800;
      font-size: 13px;
      line-height: 1.25;
    }

    .legend-desc {
      margin: 3px 0 0;
      color: rgba(255, 255, 255, 0.66);
      font-size: 11px;
      line-height: 1.45;
    }

    .axes-toggle {
      position: fixed;
      bottom: 18px;
      left: 18px;
      z-index: 22;
      display: flex;
      align-items: center;
      gap: 10px;
      height: var(--control-height);
      box-sizing: border-box;
      padding: 0 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.54);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 28px rgba(0, 0, 0, 0.42);
      cursor: pointer;
      user-select: none;
    }

    .axes-toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .axes-toggle-track {
      position: relative;
      width: 34px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      transition: background 0.18s ease;
      flex: none;
    }

    .axes-toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.18s ease;
    }

    .axes-toggle input:checked + .axes-toggle-track {
      background: var(--poppy-pink);
    }

    .axes-toggle input:checked + .axes-toggle-track .axes-toggle-thumb {
      transform: translateX(16px);
    }

    .axes-toggle input:focus-visible + .axes-toggle-track {
      outline: 2px solid rgba(255, 255, 255, 0.6);
      outline-offset: 2px;
    }

    .axes-toggle-label {
      color: #fff;
      font-family: "Michroma", sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .wormhole-btn {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 22;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: var(--control-height);
      box-sizing: border-box;
      padding: 0 22px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.54);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 28px rgba(0, 0, 0, 0.42);
      color: #fff;
      font-family: "Michroma", sans-serif;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
    }

    .wormhole-btn:hover {
      color: var(--poppy-pink);
      border-color: color-mix(in srgb, var(--poppy-pink) 60%, transparent);
      box-shadow: 0 0 28px color-mix(in srgb, var(--poppy-pink) 30%, transparent);
    }

    /* Narrow viewports: the three bottom controls can't sit side by side
       (the legend bar alone is 320px), so stack them centered, with the
       legend on top, the wormhole in the middle, and the axes toggle on
       the bottom. Each step is one control-height plus a 10px gap. */
    @media (max-width: 820px) {
      .axes-toggle {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        bottom: 18px;
      }

      .wormhole-btn {
        bottom: calc(18px + (var(--control-height) + 10px));
      }

      .legend {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        bottom: calc(18px + 2 * (var(--control-height) + 10px));
        max-height: calc(100vh - var(--nav-height) - 138px);
      }

      .legend-rows {
        max-height: calc(100vh - var(--nav-height) - 178px);
      }
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1090;
      background: rgba(0, 0, 0, 0.48);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 1100;
      width: min(560px, 94vw);
      height: 100vh;
      background: #09090f;
      border-left: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: -24px 0 70px rgba(0, 0, 0, 0.62);
      transform: translateX(105%);
      transition: transform 220ms ease;
      overflow-y: auto;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      position: relative;
      padding: calc(var(--nav-height) + 26px) 24px 22px;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--active-color) 36%, transparent), transparent 38%),
        linear-gradient(
          135deg,
          color-mix(in srgb, var(--active-color) 30%, #09090f 70%),
          #09090f 68%
        );
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .drawer-close {
      position: absolute;
      top: calc(var(--nav-height) + 16px);
      right: 18px;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }

    .drawer-title {
      max-width: calc(100% - 54px);
      margin: 0;
      color: var(--active-color);
      font-family: "Michroma", sans-serif;
      font-size: clamp(20px, 3vw, 32px);
      line-height: 1.18;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 20px color-mix(in srgb, var(--active-color) 38%, transparent);
    }

    .drawer-cluster {
      display: inline-block;
      margin-top: 14px;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--active-color);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .drawer-body {
      padding: 22px 24px 44px;
    }

    .drawer-body img {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      margin-bottom: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .drawer-section {
      margin: 0 0 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .drawer-section:last-child {
      border-bottom: 0;
    }

    .drawer-section h3 {
      margin: 0 0 8px;
      color: #fff;
      font-family: "Michroma", sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .drawer-section p {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      line-height: 1.65;
    }

    .collision-link {
      color: var(--active-color);
      text-decoration: none;
      border-bottom: 1px solid color-mix(in srgb, var(--active-color) 45%, transparent);
      transition: border-color 0.15s ease;
    }

    .collision-link:hover {
      border-bottom-color: var(--active-color);
    }

    .tag-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
    }

    .tag-chip {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 6px;
      background: color-mix(in srgb, var(--active-color) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--active-color) 45%, transparent);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      line-height: 1.3;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .read-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--active-color);
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      .top-nav {
        padding-left: 8px;
        padding-right: 8px;
      }

      .top-nav-inner {
        justify-content: flex-start;
      }
    }
  </style>
</head>

  <script src="https://unpkg.com/three@0.148.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.148.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.72.0/dist/3d-force-graph.min.js"></script>

  <script>
    "use strict";

    const DATA = JSON.parse(document.getElementById("poppy-data").textContent);

    // Globe layout: every node lives on/inside a sphere centered at 0,0,0.
    const AXIS_MAX = 10;        // CSV metrics (Relativity / Relatability / Depth) are scored 0..10
    const GLOBE_RADIUS = 720;   // distance from the origin at maximum Relativity (bigger = dots spread further apart)
    const MIN_RADIUS = 60;      // inner shell so low-Relativity nodes don't collapse onto the exact origin
    const JITTER = 0.18;        // small seeded spread so nodes with identical scores don't stack
    const POINT_JITTER = 14;    // absolute (Cartesian) units of random nudge so coincident dots never perfectly overlap

    const graphEl = document.getElementById("graph");
    const legend = document.getElementById("legend");
    const legendToggle = document.getElementById("legendToggle");
    const legendRows = document.getElementById("legendRows");

    const drawer = document.getElementById("drawer");
    const drawerBackdrop = document.getElementById("drawerBackdrop");
    const drawerClose = document.getElementById("drawerClose");
    const drawerTitle = document.getElementById("drawerTitle");
    const drawerCluster = document.getElementById("drawerCluster");
    const drawerBody = document.getElementById("drawerBody");

    let hoveredNode = null;
    let selectedNode = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hash32(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return Math.abs(h);
    }

    function rand(seed) {
      const x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function makeGlowSprite(colorHex) {
      const canvas = document.createElement("canvas");
      canvas.width = 128;
      canvas.height = 128;

      const ctx = canvas.getContext("2d");
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);

      grad.addColorStop(0, colorHex);
      grad.addColorStop(0.5, colorHex + "80");
      grad.addColorStop(1, colorHex + "00");

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 128, 128);

      const tex = new THREE.CanvasTexture(canvas);

      return new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: tex,
          transparent: true,
          depthWrite: false
        })
      );
    }

    function resetNodeVisual(node) {
      if (!node || !node.__glow) return;

      const s = node.__idleSize * 0.98;
      node.__glow.scale.set(s, s, 1);
      node.__glow.material.opacity = 0.32;
    }

    function setHighlightedNode(node) {
      if (!node || !node.__glow) return;

      const r = Math.min(node.__idleSize, 22);
      node.__glow.scale.set(r, r, 1);
      node.__glow.material.opacity = 0.82;
    }

    function renderList(items) {
      if (!items || !items.length) return "<p>—</p>";
      return `<p>${items.map(escapeHtml).join(", ")}</p>`;
    }

    function renderChips(items) {
      if (!items || !items.length) return "<p>—</p>";
      const chips = items
        .map(item => `<span class="tag-chip">${escapeHtml(item)}</span>`)
        .join("");
      return `<div class="tag-chips">${chips}</div>`;
    }

    function renderCollisions(items) {
      if (!items || !items.length) return "<p>—</p>";
      const parts = items.map(item => {
        const label = escapeHtml(item.label || "");
        return item.url
          ? `<a class="collision-link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${label}</a>`
          : label;
      });
      return `<p>${parts.join(", ")}</p>`;
    }

    function openDrawer(node) {
      selectedNode = node;
      setHighlightedNode(node);

      const accent = node.color || "#FF1447";
      document.documentElement.style.setProperty("--active-color", accent);

      drawerTitle.textContent = node.label || node.id || "";
      drawerCluster.textContent = node.cluster || "";

      const cover = node.coverUrl
        ? `<img src="${escapeHtml(node.coverUrl)}" alt="">`
        : "";

      const contentLink = node.contentUrl
        ? `<a class="read-link" href="${escapeHtml(node.contentUrl)}" target="_blank" rel="noopener">Read More</a>`
        : `<p>Content not ready.</p>`;

      const subpartsHtml = node.subparts
        ? `
          <section class="drawer-section">
            <h3>Sub-parts</h3>
            <p>${escapeHtml(node.subparts)}</p>
          </section>
        `
        : "";

      drawerBody.innerHTML = `
        ${cover}

        <section class="drawer-section">
          <h3>Description</h3>
          <p>${escapeHtml(node.description || "No description yet.")}</p>
        </section>

        ${subpartsHtml}

        <section class="drawer-section">
          <h3>Characters</h3>
          ${renderChips(node.characters)}
        </section>

        <section class="drawer-section">
          <h3>Collisions</h3>
          ${renderCollisions(node.collisionLinks || [])}
        </section>

        <section class="drawer-section">
          <h3>Content</h3>
          ${contentLink}
        </section>
      `;

      drawer.classList.add("open");
      drawerBackdrop.classList.add("open");
      drawer.setAttribute("aria-hidden", "false");
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      drawerBackdrop.classList.remove("open");
      drawer.setAttribute("aria-hidden", "true");

      if (selectedNode) {
        resetNodeVisual(selectedNode);
      }

      selectedNode = null;
    }

    function buildLegend() {
      legendRows.innerHTML = "";

      DATA.clusters.forEach(cluster => {
        const row = document.createElement("div");
        row.className = "legend-row";

        row.innerHTML = `
          <div class="legend-swatch" style="background:${escapeHtml(cluster.color)}; color:${escapeHtml(cluster.color)};"></div>
          <div>
            <p class="legend-name" style="color:${escapeHtml(cluster.color)};">${escapeHtml(cluster.name)}</p>
            <p class="legend-desc">${escapeHtml(cluster.description || "")}</p>
          </div>
        `;

        legendRows.appendChild(row);
      });
    }

    function prepareGraphData() {
      const nodeById = new Map(DATA.nodes.map(node => [String(node.id), node]));

      DATA.nodes.forEach(node => {
        // --- Globe layout: pure data-driven spherical coordinates, centered on 0,0,0. ---
        // Cluster no longer affects position (it only colors the node):
        //   radius    <- (X) Relativity   : INVERTED -- high Relativity hugs the core, low flings outward
        //   latitude  <- (Y) Relatability : pole (0) to pole (PI)
        //   longitude <- (Z) Depth        : all the way around the equator (0..2PI)
        const seed = hash32(String(node.id) + "|" + String(node.cluster));

        // Normalize each metric to 0..1, then add a small seeded jitter so nodes
        // that share identical scores don't land on the exact same point.
        const relN   = Math.max(0, Math.min(1, node.xValue / AXIS_MAX));
        const relatN = Math.max(0, Math.min(1, node.yValue / AXIS_MAX));
        const depthN = Math.max(0, Math.min(1, node.zValue / AXIS_MAX));

        const r   = MIN_RADIUS + (GLOBE_RADIUS - MIN_RADIUS) * (1 - relN) * (1 + (rand(seed) - 0.5) * JITTER);
        const lat = (relatN + (rand(seed + 1) - 0.5) * JITTER) * Math.PI;       // polar angle, north -> south
        const lon = (depthN + (rand(seed + 2) - 0.5) * JITTER) * Math.PI * 2;   // azimuth around the pole

        // Final absolute (Cartesian) jitter: a small per-node random nudge on each
        // axis so any dots that landed on identical coords still separate visibly.
        // Seeded off the node id, so it's stable across reloads (not Math.random).
        const jx = (rand(seed + 3) - 0.5) * 2 * POINT_JITTER;
        const jy = (rand(seed + 4) - 0.5) * 2 * POINT_JITTER;
        const jz = (rand(seed + 5) - 0.5) * 2 * POINT_JITTER;

        node.x = r * Math.sin(lat) * Math.cos(lon) + jx;
        node.y = r * Math.cos(lat) + jy;
        node.z = r * Math.sin(lat) * Math.sin(lon) + jz;

        node.fx = node.x;
        node.fy = node.y;
        node.fz = node.z;

        node.val = node.size;
      });

      // Resolve link endpoints from string ids to node-object references.
      // The layout's "link" force (which normally does this) is disabled to
      // keep the fixed fx/fy/fz layout frozen, so we must resolve manually or
      // the renderer skips any link whose endpoints aren't objects.
      DATA.links.forEach(link => {
        const source = nodeById.get(String(link.source));
        const target = nodeById.get(String(link.target));
        if (source) link.source = source;
        if (target) link.target = target;
      });

      // Build each node's collision list from the (already de-duped, undirected)
      // links so the drawer shows a collision on BOTH endpoints, not just the
      // node whose CSV cell happened to name the other. Each entry carries the
      // partner's title and story URL for a clickable link.
      DATA.nodes.forEach(node => { node.collisionLinks = []; });
      DATA.links.forEach(link => {
        const a = link.source;
        const b = link.target;
        if (typeof a !== "object" || typeof b !== "object") return;
        a.collisionLinks.push({ label: b.label, url: b.contentUrl });
        b.collisionLinks.push({ label: a.label, url: a.contentUrl });
      });

      return {
        nodes: DATA.nodes,
        links: DATA.links
      };
    }

    function start() {
      buildLegend();

      legendToggle.addEventListener("click", () => {
        const isOpen = legend.classList.toggle("open");
        legendToggle.textContent = isOpen
          ? "Multiverse Color Legend ▾"
          : "Multiverse Color Legend ▴";
      });

      drawerClose.addEventListener("click", closeDrawer);
      drawerBackdrop.addEventListener("click", closeDrawer);

      window.addEventListener("keydown", event => {
        if (event.key === "Escape") closeDrawer();
      });

      const graphData = prepareGraphData();

      const Graph = ForceGraph3D()(graphEl)
        .enablePointerInteraction(true)
        .graphData(graphData)
        .showNavInfo(false)
        .d3Force("link", null)
        .d3Force("charge", null)
        .enableNodeDrag(false)
        .cooldownTicks(0)
        .nodeLabel(() => "")
        .nodeThreeObject(node => {
          const colorHex = node.color || "#FF1447";
          const color = new THREE.Color(colorHex);

          const core = new THREE.Mesh(
            new THREE.SphereGeometry(5, 24, 24),
            new THREE.MeshStandardMaterial({
              color,
              metalness: 0.12,
              roughness: 0.38
            })
          );

          const sizeVal = Number(node.size) || 1;
          const scale = 0.6 + sizeVal * 0.09;
          core.scale.set(scale, scale, scale);

          const glow = makeGlowSprite(colorHex);
          glow.raycast = () => {};
          glow.material.depthTest = false;
          glow.renderOrder = 10;

          const idleSize = Math.max(42, 5 * scale * 5.4);
          glow.scale.set(idleSize * 0.98, idleSize * 0.98, 1);
          glow.material.opacity = 0.32;
          core.add(glow);

          node.__core = core;
          node.__glow = glow;
          node.__idleSize = idleSize;

          return core;
        })
        .linkColor(() => "#FFFFFF")
        .linkWidth(0)
        .linkOpacity(1);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });

      renderer.setPixelRatio(window.devicePixelRatio || 1);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;

      Graph.renderer(renderer);
      Graph.width(window.innerWidth).height(window.innerHeight);
      Graph.backgroundColor("rgba(0,0,0,0)");

      const scene = Graph.scene();
      scene.background = null;

      scene.add(new THREE.AmbientLight(0xffffff, 0.36));

      const dir = new THREE.DirectionalLight(0xffffff, 0.7);
      dir.position.set(60, 80, 40);
      scene.add(dir);

      const controls = Graph.controls();
      controls.enableRotate = true;
      controls.enablePan = true;
      controls.minDistance = 20;
      controls.maxDistance = 1600;

      const bounds = (() => {
        let minX = Infinity;
        let minY = Infinity;
        let minZ = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;
        let maxZ = -Infinity;

        graphData.nodes.forEach(node => {
          minX = Math.min(minX, node.x);
          minY = Math.min(minY, node.y);
          minZ = Math.min(minZ, node.z);
          maxX = Math.max(maxX, node.x);
          maxY = Math.max(maxY, node.y);
          maxZ = Math.max(maxZ, node.z);
        });

        if (!Number.isFinite(minX)) {
          minX = minY = minZ = -100;
          maxX = maxY = maxZ = 100;
        }

        const pad = 45;
        minX -= pad;
        minY -= pad;
        minZ -= pad;
        maxX += pad;
        maxY += pad;
        maxZ += pad;

        return {
          minX, minY, minZ,
          maxX, maxY, maxZ,
          cx: (minX + maxX) / 2,
          cy: (minY + maxY) / 2,
          cz: (minZ + maxZ) / 2
        };
      })();

      controls.target.set(bounds.cx, bounds.cy, bounds.cz);

      const spanX = bounds.maxX - bounds.minX;
      const spanY = bounds.maxY - bounds.minY;
      const spanZ = bounds.maxZ - bounds.minZ;
      const diag = Math.max(spanX, spanY, spanZ);

      Graph.cameraPosition(
        {
          x: bounds.cx - diag * 1.15,
          y: bounds.cy + diag * 0.55,
          z: bounds.cz + diag * 1.35
        },
        {
          x: bounds.cx,
          y: bounds.cy,
          z: bounds.cz
        },
        1200
      );

      // --- Globe reference frame (hidden by default; toggled via the "Show globe" switch) ---
      // Centered on 0,0,0: three axes through the origin, a faint wireframe globe at
      // max Depth, equator + meridian rings, and a bright marker at the exact center.
      const axesGroup = new THREE.Group();
      axesGroup.visible = false;

      function makeAxisLabel(text, colorHex) {
        const canvas = document.createElement("canvas");
        canvas.width = 256;
        canvas.height = 64;

        const ctx = canvas.getContext("2d");
        ctx.font = "600 32px Michroma, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = colorHex;
        ctx.fillText(text, 128, 34);

        const tex = new THREE.CanvasTexture(canvas);

        const sprite = new THREE.Sprite(
          new THREE.SpriteMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
            depthTest: false
          })
        );

        sprite.scale.set(150, 37, 1);
        sprite.renderOrder = 20;
        return sprite;
      }

      function addAxis(from, to, colorHex, labelText) {
        const geom = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(from.x, from.y, from.z),
          new THREE.Vector3(to.x, to.y, to.z)
        ]);

        const line = new THREE.Line(
          geom,
          new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.8 })
        );
        axesGroup.add(line);

        const label = makeAxisLabel(labelText, colorHex);
        label.position.set(to.x, to.y, to.z);
        axesGroup.add(label);
      }

      // Three axes through the origin so the center (0,0,0) is unmistakable.
      const FRAME_R = GLOBE_RADIUS + 30;
      addAxis({ x: -FRAME_R, y: 0, z: 0 }, { x: FRAME_R, y: 0, z: 0 }, "#4D96FF", "Relativity (inv r)");
      addAxis({ x: 0, y: -FRAME_R, z: 0 }, { x: 0, y: FRAME_R, z: 0 }, "#6BCB77", "Relatability (lat)");
      addAxis({ x: 0, y: 0, z: -FRAME_R }, { x: 0, y: 0, z: FRAME_R }, "#FF6B6B", "Depth (lon)");

      // Faint wireframe globe at maximum Depth radius.
      const globeWire = new THREE.Mesh(
        new THREE.SphereGeometry(GLOBE_RADIUS, 24, 16),
        new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.06 })
      );
      globeWire.raycast = () => {};
      axesGroup.add(globeWire);

      // Equator + meridian rings at the globe surface.
      function addRing(asMeridian) {
        const pts = [];
        for (let i = 0; i <= 96; i++) {
          const a = (i / 96) * Math.PI * 2;
          pts.push(new THREE.Vector3(Math.cos(a) * GLOBE_RADIUS, 0, Math.sin(a) * GLOBE_RADIUS));
        }
        const ring = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(pts),
          new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.16 })
        );
        if (asMeridian) ring.rotation.x = Math.PI / 2;
        axesGroup.add(ring);
      }
      addRing(false);  // equator (X-Z plane)
      addRing(true);   // meridian (X-Y plane)

      // Bright marker at the exact center, 0,0,0.
      const originMarker = new THREE.Mesh(
        new THREE.SphereGeometry(6, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      originMarker.raycast = () => {};
      axesGroup.add(originMarker);

      scene.add(axesGroup);

      const axesToggle = document.getElementById("axesToggle");
      axesToggle.checked = false;
      axesGroup.visible = false;
      axesToggle.addEventListener("change", () => {
        axesGroup.visible = axesToggle.checked;
      });

      Graph.onNodeHover((node, prev) => {
        const prevNode = prev || hoveredNode;

        if (prevNode && prevNode !== node && prevNode !== selectedNode) {
          resetNodeVisual(prevNode);
        }

        hoveredNode = node || null;

        if (!hoveredNode) {
          graphData.nodes.forEach(n => {
            if (n !== selectedNode) resetNodeVisual(n);
          });
          return;
        }

        setHighlightedNode(hoveredNode);
      });

      Graph.onNodeClick(node => {
        openDrawer(node);
      });

      renderer.setAnimationLoop(() => {
        const t = performance.now() * 0.012;
        const pulse = 0.70 + 0.30 * (0.5 + 0.5 * Math.sin(t));

        if (hoveredNode && hoveredNode.__glow && hoveredNode !== selectedNode) {
          hoveredNode.__glow.material.opacity = pulse;
        }

        if (selectedNode && selectedNode.__glow) {
          selectedNode.__glow.material.opacity = 0.62;
          const r = Math.min(selectedNode.__idleSize, 22);
          selectedNode.__glow.scale.set(r, r, 1);
        }

        renderer.render(scene, Graph.camera());
      });

      window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        Graph.width(window.innerWidth).height(window.innerHeight);
      });
    }

    start();
  </script>
</body>
</html>
