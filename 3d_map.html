<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poppyverse 3D Map</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="50%" x="50%" dominant-baseline="middle" text-anchor="middle" font-size="52">🌷</text></svg>'>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --poppy-pink: #FF1447;
      --active-color: #FF1447;
      --nav-height: 58px;
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.68);
      --line: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      background: #06060a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 12%, rgba(255, 20, 71, 0.16), transparent 32%),
        radial-gradient(circle at 80% 30%, rgba(112, 68, 255, 0.14), transparent 34%),
        linear-gradient(135deg, #050507 0%, #0b0b12 48%, #11111d 100%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.38) 72%, rgba(0, 0, 0, 0.72) 100%);
    }

    a {
      color: inherit;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 10px 16px;
      pointer-events: none;
    }

    .top-nav-inner {
      width: max-content;
      max-width: calc(100vw - 32px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 28px rgba(0, 0, 0, 0.42);
      pointer-events: auto;
      overflow-x: auto;
    }

    .top-nav-link {
      flex: 0 0 auto;
      padding: 8px 13px;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition:
        color 160ms ease,
        background 160ms ease,
        box-shadow 160ms ease;
    }

    .top-nav-link:hover,
    .top-nav-link.active {
      color: #fff;
      background: var(--poppy-pink);
      box-shadow: 0 0 18px rgba(255, 20, 71, 0.44);
    }

    #graph {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
    }

    .hud-title {
      position: fixed;
      top: calc(var(--nav-height) + 20px);
      left: 22px;
      z-index: 20;
      pointer-events: none;
    }

    .hud-title h1 {
      margin: 0;
      color: var(--poppy-pink);
      font-family: "Michroma", sans-serif;
      font-size: clamp(18px, 2.3vw, 30px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(255, 20, 71, 0.68),
        0 0 30px rgba(255, 20, 71, 0.34);
    }

    .hud-title p {
      max-width: 460px;
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.66);
      font-size: 13px;
      line-height: 1.5;
      text-shadow: 0 0 14px rgba(0, 0, 0, 0.82);
    }

    .legend {
      position: fixed;
      top: calc(var(--nav-height) + 20px);
      right: 18px;
      z-index: 22;
      width: min(360px, calc(100vw - 36px));
      max-height: calc(100vh - var(--nav-height) - 40px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.54);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 28px rgba(0, 0, 0, 0.42);
    }

    .legend-toggle {
      width: 100%;
      padding: 12px 14px;
      border: 0;
      background: transparent;
      color: #fff;
      font-family: "Michroma", sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-align: left;
      text-transform: uppercase;
      cursor: pointer;
    }

    .legend-rows {
      display: none;
      max-height: calc(100vh - var(--nav-height) - 100px);
      overflow-y: auto;
      padding: 0 14px 14px;
    }

    .legend.open .legend-rows {
      display: block;
    }

    .legend-row {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 9px;
      padding: 9px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      margin-top: 3px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: 0 0 10px currentColor;
    }

    .legend-name {
      margin: 0;
      font-weight: 800;
      font-size: 13px;
      line-height: 1.25;
    }

    .legend-desc {
      margin: 3px 0 0;
      color: rgba(255, 255, 255, 0.66);
      font-size: 11px;
      line-height: 1.45;
    }

    .hover-tip {
      position: fixed;
      left: 22px;
      bottom: 72px;
      z-index: 26;
      color: var(--poppy-pink);
      font-family: "Michroma", sans-serif;
      font-size: clamp(18px, 2vw, 28px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(0, 0, 0, 0.92);
      opacity: 0;
      transform: translateY(8px);
      transition:
        opacity 140ms ease,
        transform 140ms ease;
      pointer-events: none;
      max-width: min(760px, calc(100vw - 44px));
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hover-tip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .axis-explainer {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 24;
      color: rgba(255, 255, 255, 0.82);
      text-align: right;
      font-size: 10px;
      line-height: 1.45;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1090;
      background: rgba(0, 0, 0, 0.48);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 1100;
      width: min(560px, 94vw);
      height: 100vh;
      background: #09090f;
      border-left: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: -24px 0 70px rgba(0, 0, 0, 0.62);
      transform: translateX(105%);
      transition: transform 220ms ease;
      overflow-y: auto;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      position: relative;
      padding: calc(var(--nav-height) + 26px) 24px 22px;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--active-color) 36%, transparent), transparent 38%),
        linear-gradient(
          135deg,
          color-mix(in srgb, var(--active-color) 30%, #09090f 70%),
          #09090f 68%
        );
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .drawer-close {
      position: absolute;
      top: calc(var(--nav-height) + 16px);
      right: 18px;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }

    .drawer-title {
      max-width: calc(100% - 54px);
      margin: 0;
      color: var(--active-color);
      font-family: "Michroma", sans-serif;
      font-size: clamp(20px, 3vw, 32px);
      line-height: 1.18;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 20px color-mix(in srgb, var(--active-color) 38%, transparent);
    }

    .drawer-cluster {
      display: inline-block;
      margin-top: 14px;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--active-color);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .drawer-body {
      padding: 22px 24px 44px;
    }

    .drawer-body img {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      margin-bottom: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .drawer-section {
      margin: 0 0 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .drawer-section:last-child {
      border-bottom: 0;
    }

    .drawer-section h3 {
      margin: 0 0 8px;
      color: #fff;
      font-family: "Michroma", sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .drawer-section p {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      line-height: 1.65;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.065);
      border: 1px solid rgba(255, 255, 255, 0.11);
    }

    .metric-label {
      color: rgba(255, 255, 255, 0.54);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .metric-value {
      margin-top: 4px;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
    }

    .read-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--active-color);
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      .hud-title {
        top: calc(var(--nav-height) + 14px);
        left: 16px;
        right: 16px;
      }

      .legend {
        display: none;
      }

      .axis-explainer {
        display: none;
      }

      .top-nav {
        padding-left: 8px;
        padding-right: 8px;
      }

      .top-nav-inner {
        justify-content: flex-start;
      }
    }
  </style>
</head>

  <script>
    "use strict";

    const DATA = JSON.parse(document.getElementById("poppy-data").textContent);

    const CLUSTER_SPREAD = 150;
    const DEPTH_SCALE = 35;
    const NODE_SCATTER = 50;

    const graphEl = document.getElementById("graph");
    const hoverTip = document.getElementById("hoverTip");
    const legend = document.getElementById("legend");
    const legendToggle = document.getElementById("legendToggle");
    const legendRows = document.getElementById("legendRows");

    const drawer = document.getElementById("drawer");
    const drawerBackdrop = document.getElementById("drawerBackdrop");
    const drawerClose = document.getElementById("drawerClose");
    const drawerTitle = document.getElementById("drawerTitle");
    const drawerCluster = document.getElementById("drawerCluster");
    const drawerBody = document.getElementById("drawerBody");

    let hoveredNode = null;
    let selectedNode = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hash32(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return Math.abs(h);
    }

    function rand(seed) {
      const x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function makeGlowSprite(colorHex) {
      const canvas = document.createElement("canvas");
      canvas.width = 128;
      canvas.height = 128;

      const ctx = canvas.getContext("2d");
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);

      grad.addColorStop(0, colorHex);
      grad.addColorStop(0.5, colorHex + "80");
      grad.addColorStop(1, colorHex + "00");

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 128, 128);

      const tex = new THREE.CanvasTexture(canvas);

      return new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: tex,
          transparent: true,
          depthWrite: false
        })
      );
    }

    function resetNodeVisual(node) {
      if (!node || !node.__glow) return;

      const s = node.__idleSize * 0.98;
      node.__glow.scale.set(s, s, 1);
      node.__glow.material.opacity = 0.32;
    }

    function setHighlightedNode(node) {
      if (!node || !node.__glow) return;

      const r = Math.min(node.__idleSize, 22);
      node.__glow.scale.set(r, r, 1);
      node.__glow.material.opacity = 0.82;
    }

    function showHoverTip(node) {
      if (!node || selectedNode) {
        hoverTip.classList.remove("visible");
        hoverTip.textContent = "";
        return;
      }

      hoverTip.textContent = node.label || node.id || "";
      hoverTip.style.color = node.color || "#FF1447";
      hoverTip.classList.add("visible");
    }

    function hideHoverTip() {
      hoverTip.classList.remove("visible");
      hoverTip.textContent = "";
    }

    function renderList(items) {
      if (!items || !items.length) return "<p>—</p>";
      return `<p>${items.map(escapeHtml).join(", ")}</p>`;
    }

    function openDrawer(node) {
      selectedNode = node;
      hideHoverTip();
      setHighlightedNode(node);

      const accent = node.color || "#FF1447";
      document.documentElement.style.setProperty("--active-color", accent);

      drawerTitle.textContent = node.label || node.id || "";
      drawerCluster.textContent = node.cluster || "";

      const cover = node.coverUrl
        ? `<img src="${escapeHtml(node.coverUrl)}" alt="">`
        : "";

      const contentLink = node.contentUrl
        ? `<a class="read-link" href="${escapeHtml(node.contentUrl)}" target="_blank" rel="noopener">Read More</a>`
        : `<p>Content not ready.</p>`;

      drawerBody.innerHTML = `
        ${cover}

        <section class="drawer-section">
          <h3>Description</h3>
          <p>${escapeHtml(node.description || "No description yet.")}</p>
        </section>

        <section class="drawer-section">
          <h3>Cluster Description</h3>
          <p>${escapeHtml(node.clusterDescription || "No cluster description yet.")}</p>
        </section>

        <section class="drawer-section">
          <h3>Map Values</h3>
          <div class="metric-grid">
            <div class="metric">
              <div class="metric-label">Entanglement</div>
              <div class="metric-value">${escapeHtml(node.xValue)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Gravity</div>
              <div class="metric-value">${escapeHtml(node.zValue)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Size</div>
              <div class="metric-value">${escapeHtml(node.size)}</div>
            </div>
          </div>
        </section>

        <section class="drawer-section">
          <h3>Characters</h3>
          ${renderList(node.characters)}
        </section>

        <section class="drawer-section">
          <h3>Collisions</h3>
          ${renderList(node.collisionNames || [])}
        </section>

        <section class="drawer-section">
          <h3>Content</h3>
          ${contentLink}
        </section>
      `;

      drawer.classList.add("open");
      drawerBackdrop.classList.add("open");
      drawer.setAttribute("aria-hidden", "false");
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      drawerBackdrop.classList.remove("open");
      drawer.setAttribute("aria-hidden", "true");

      if (selectedNode) {
        resetNodeVisual(selectedNode);
      }

      selectedNode = null;
    }

    function buildLegend() {
      legendRows.innerHTML = "";

      DATA.clusters.forEach(cluster => {
        const row = document.createElement("div");
        row.className = "legend-row";

        row.innerHTML = `
          <div class="legend-swatch" style="background:${escapeHtml(cluster.color)}; color:${escapeHtml(cluster.color)};"></div>
          <div>
            <p class="legend-name" style="color:${escapeHtml(cluster.color)};">${escapeHtml(cluster.name)}</p>
            <p class="legend-desc">${escapeHtml(cluster.description || "")}</p>
          </div>
        `;

        legendRows.appendChild(row);
      });
    }

    function prepareGraphData() {
      const clusterOrder = DATA.clusters.map(c => c.name);
      const clusterIndex = new Map(clusterOrder.map((name, index) => [name, index]));

      const nodeById = new Map(DATA.nodes.map(node => [String(node.id), node]));

      DATA.nodes.forEach(node => {
        const idx = clusterIndex.has(node.cluster) ? clusterIndex.get(node.cluster) : clusterOrder.length;
        const seed = hash32(String(node.id) + "|" + String(node.cluster));

        const angle = rand(seed) * Math.PI * 2;
        const radius = rand(seed + 1) * NODE_SCATTER + 20;

        node.x = node.xValue * 40 + Math.cos(angle) * radius;
        node.y = -node.zValue * DEPTH_SCALE;
        node.z = idx * CLUSTER_SPREAD + Math.sin(angle) * radius;

        node.fx = node.x;
        node.fy = node.y;
        node.fz = node.z;

        node.val = node.size;
      });

      DATA.nodes.forEach(node => {
        node.collisionNames = (node.collisions || [])
          .map(raw => {
            const target = nodeById.get(String(raw));
            return target ? target.label : null;
          })
          .filter(Boolean);
      });

      return {
        nodes: DATA.nodes,
        links: DATA.links
      };
    }

    function addTextSprite(scene, text, x, y, z, scale = 160) {
      const canvas = document.createElement("canvas");
      canvas.width = 1024;
      canvas.height = 256;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffffff";

      let fontSize = 86;
      const pad = 44;

      while (fontSize > 24) {
        ctx.font = `bold ${fontSize}px Arial`;
        if (ctx.measureText(text).width <= canvas.width - pad * 2) break;
        fontSize -= 4;
      }

      ctx.font = `bold ${fontSize}px Arial`;
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const tex = new THREE.CanvasTexture(canvas);
      const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: tex,
          transparent: true,
          opacity: 0.82
        })
      );

      sprite.scale.set(scale, scale * 0.25, 1);
      sprite.position.set(x, y, z);
      scene.add(sprite);

      return sprite;
    }

    function addAxes(scene, nodes) {
      let minZ = Infinity;

      nodes.forEach(node => {
        minZ = Math.min(minZ, node.z);
      });

      if (!Number.isFinite(minZ)) minZ = 0;

      const axisZ = minZ - 120;
      const axisMat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.72
      });

      const tickMat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.48
      });

      const relToX = value => value * 40;
      const depToY = value => -value * DEPTH_SCALE;

      const x0 = relToX(0) - 40;
      const x1 = relToX(10) + 40;
      const y0 = depToY(0) - 40;
      const y1 = depToY(10) + 40;

      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(x0, 0, axisZ),
          new THREE.Vector3(x1, 0, axisZ)
        ]),
        axisMat
      ));

      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, y0, axisZ),
          new THREE.Vector3(0, y1, axisZ)
        ]),
        axisMat
      ));

      addTextSprite(scene, "QUANTUM ENTANGLEMENT", (x0 + x1) / 2, y0 - 30, axisZ, 300);
      addTextSprite(scene, "EMOTIONAL GRAVITY", x0 - 35, (y0 + y1) / 2, axisZ, 260);

      for (let i = 0; i <= 10; i++) {
        const x = relToX(i);

        scene.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(x, 0, axisZ),
            new THREE.Vector3(x, -10, axisZ)
          ]),
          tickMat
        ));

        addTextSprite(scene, String(i), x, -34, axisZ, 70);
      }

      for (let d = 0; d <= 10; d++) {
        const y = depToY(d);

        scene.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, y, axisZ),
            new THREE.Vector3(-10, y, axisZ)
          ]),
          tickMat
        ));

        addTextSprite(scene, String(d), -55, y, axisZ, 70);
      }
    }

    function boundsForNodes(nodes) {
      let minX = Infinity;
      let minY = Infinity;
      let minZ = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;
      let maxZ = -Infinity;

      nodes.forEach(node => {
        minX = Math.min(minX, node.x);
        minY = Math.min(minY, node.y);
        minZ = Math.min(minZ, node.z);
        maxX = Math.max(maxX, node.x);
        maxY = Math.max(maxY, node.y);
        maxZ = Math.max(maxZ, node.z);
      });

      const pad = 45;

      minX -= pad;
      minY -= pad;
      minZ -= pad;
      maxX += pad;
      maxY += pad;
      maxZ += pad;

      return {
        minX, minY, minZ,
        maxX, maxY, maxZ,
        cx: (minX + maxX) / 2,
        cy: (minY + maxY) / 2,
        cz: (minZ + maxZ) / 2
      };
    }

    function addBoundingCube(scene, bounds) {
      const p000 = new THREE.Vector3(bounds.minX, bounds.minY, bounds.minZ);
      const p100 = new THREE.Vector3(bounds.maxX, bounds.minY, bounds.minZ);
      const p010 = new THREE.Vector3(bounds.minX, bounds.maxY, bounds.minZ);
      const p110 = new THREE.Vector3(bounds.maxX, bounds.maxY, bounds.minZ);

      const p001 = new THREE.Vector3(bounds.minX, bounds.minY, bounds.maxZ);
      const p101 = new THREE.Vector3(bounds.maxX, bounds.minY, bounds.maxZ);
      const p011 = new THREE.Vector3(bounds.minX, bounds.maxY, bounds.maxZ);
      const p111 = new THREE.Vector3(bounds.maxX, bounds.maxY, bounds.maxZ);

      const pts = [
        p000, p100, p100, p110, p110, p010, p010, p000,
        p001, p101, p101, p111, p111, p011, p011, p001,
        p000, p001, p100, p101, p110, p111, p010, p011
      ];

      const geom = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.24
      });

      scene.add(new THREE.LineSegments(geom, mat));
    }

    function start() {
      buildLegend();

      legendToggle.addEventListener("click", () => {
        const isOpen = legend.classList.toggle("open");
        legendToggle.textContent = isOpen
          ? "Multiverse Color Legend ▾"
          : "Multiverse Color Legend ▸";
      });

      drawerClose.addEventListener("click", closeDrawer);
      drawerBackdrop.addEventListener("click", closeDrawer);

      window.addEventListener("keydown", event => {
        if (event.key === "Escape") closeDrawer();
      });

      const graphData = prepareGraphData();

      const Graph = ForceGraph3D()(graphEl)
        .enablePointerInteraction(true)
        .graphData(graphData)
        .showNavInfo(false)
        .d3Force("link", null)
        .d3Force("charge", null)
        .enableNodeDrag(false)
        .cooldownTicks(0)
        .nodeLabel(() => "")
        .nodeThreeObject(node => {
          const colorHex = node.color || "#FF1447";
          const color = new THREE.Color(colorHex);

          const core = new THREE.Mesh(
            new THREE.SphereGeometry(5, 24, 24),
            new THREE.MeshStandardMaterial({
              color,
              metalness: 0.12,
              roughness: 0.38
            })
          );

          const sizeVal = Number(node.size) || 1;
          const scale = 0.6 + sizeVal * 0.09;
          core.scale.set(scale, scale, scale);

          const glow = makeGlowSprite(colorHex);
          glow.raycast = () => {};
          glow.material.depthTest = false;
          glow.renderOrder = 10;

          const idleSize = Math.max(42, 5 * scale * 5.4);
          glow.scale.set(idleSize * 0.98, idleSize * 0.98, 1);
          glow.material.opacity = 0.32;
          core.add(glow);

          node.__core = core;
          node.__glow = glow;
          node.__idleSize = idleSize;

          return core;
        })
        .linkColor(link => link.color || "#ffffff")
        .linkWidth(link => link.width || 1.6)
        .linkOpacity(0.55);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });

      renderer.setPixelRatio(window.devicePixelRatio || 1);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;

      Graph.renderer(renderer);
      Graph.width(window.innerWidth).height(window.innerHeight);
      Graph.backgroundColor("rgba(0,0,0,0)");

      const scene = Graph.scene();
      scene.background = null;

      scene.add(new THREE.AmbientLight(0xffffff, 0.36));

      const dir = new THREE.DirectionalLight(0xffffff, 0.7);
      dir.position.set(60, 80, 40);
      scene.add(dir);

      const controls = Graph.controls();
      controls.enableRotate = true;
      controls.enablePan = true;
      controls.minDistance = 20;
      controls.maxDistance = 1200;

      addAxes(scene, graphData.nodes);

      const bounds = boundsForNodes(graphData.nodes);
      addBoundingCube(scene, bounds);

      controls.target.set(bounds.cx, bounds.cy, bounds.cz);

      const spanX = bounds.maxX - bounds.minX;
      const spanY = bounds.maxY - bounds.minY;
      const spanZ = bounds.maxZ - bounds.minZ;
      const diag = Math.max(spanX, spanY, spanZ);

      Graph.cameraPosition(
        {
          x: bounds.cx - diag * 1.15,
          y: bounds.cy + diag * 0.55,
          z: bounds.cz + diag * 1.35
        },
        {
          x: bounds.cx,
          y: bounds.cy,
          z: bounds.cz
        },
        1200
      );

      Graph.onNodeHover((node, prev) => {
        const prevNode = prev || hoveredNode;

        if (prevNode && prevNode !== node && prevNode !== selectedNode) {
          resetNodeVisual(prevNode);
        }

        hoveredNode = node || null;

        if (!hoveredNode) {
          hideHoverTip();

          graphData.nodes.forEach(n => {
            if (n !== selectedNode) resetNodeVisual(n);
          });

          return;
        }

        showHoverTip(hoveredNode);
        setHighlightedNode(hoveredNode);
      });

      Graph.onNodeClick(node => {
        openDrawer(node);
      });

      renderer.setAnimationLoop(() => {
        const t = performance.now() * 0.012;
        const pulse = 0.70 + 0.30 * (0.5 + 0.5 * Math.sin(t));

        if (hoveredNode && hoveredNode.__glow && hoveredNode !== selectedNode) {
          hoveredNode.__glow.material.opacity = pulse;
        }

        if (selectedNode && selectedNode.__glow) {
          selectedNode.__glow.material.opacity = 0.62;
          const r = Math.min(selectedNode.__idleSize, 22);
          selectedNode.__glow.scale.set(r, r, 1);
        }

        renderer.render(scene, Graph.camera());
      });

      window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        Graph.width(window.innerWidth).height(window.innerHeight);
      });
    }

    start();
  </script>
</body>
